  # Nginx Production - Reverse Proxy с SSL
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Production конфигурация Nginx из проекта
      # ВАЖНО: Файл должен находиться в корне проекта
      # Альтернатива: используйте абсолютный путь /home/infrasafe/nginx-docker/nginx.production.conf
      - ./nginx.production.conf:/etc/nginx/nginx.conf:ro
      # SSL сертификаты (монтируем отдельные файлы)
      - /etc/letsencrypt/live/infrasafe.aisolutions.uz/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
      - /etc/letsencrypt/live/infrasafe.aisolutions.uz/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
      - /etc/letsencrypt/live/infrasafe.aisolutions.uz/chain.pem:/etc/nginx/ssl/chain.pem:ro
      # Статические файлы из frontend контейнера
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./admin.html:/usr/share/nginx/html/admin.html:ro
      - ./about.html:/usr/share/nginx/html/about.html:ro
      - ./contacts.html:/usr/share/nginx/html/contacts.html:ro
      - ./documentation.html:/usr/share/nginx/html/documentation.html:ro
      - ./css:/usr/share/nginx/html/css:ro
      - ./public:/usr/share/nginx/html/public:ro
      - ./data:/usr/share/nginx/html/data:ro
    depends_on:
      - app
      - frontend
    networks:
      - leaflet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  app_logs:

networks:
  leaflet-network:
    driver: bridge