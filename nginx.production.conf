# Production конфигурация Nginx для InfraSafe в Docker
# Домен: infrasafe.aisolutions.uz
# Обновлено: 2025-11-23
# Для использования в docker-compose.unified.yml

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Логирование
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Основные оптимизации
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    reset_timedout_connection on;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;
    client_max_body_size 10M;

    # Буферы
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/rss+xml
        application/xml
        application/xhtml+xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
    gzip_min_length 256;
    gzip_disable "msie6";

    # CORS map для разрешенных источников
    map $http_origin $cors_origin {
        default "";
        "~^https://infrasafe\.uz$" "https://infrasafe.uz";
        "~^https://infrasafe\.aisolutions\.uz$" "https://infrasafe.aisolutions.uz";
    }

    # ==========================================
    # HTTP -> HTTPS редирект
    # ==========================================
    server {
        listen 80;
        listen [::]:80;
        server_name infrasafe.aisolutions.uz;

        # Перенаправление с HTTP на HTTPS
        return 301 https://$host$request_uri;
    }

    # ==========================================
    # HTTPS сервер
    # ==========================================
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name infrasafe.aisolutions.uz;

        # ==========================================
        # SSL/TLS конфигурация
        # ==========================================
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        
        # Современные протоколы и шифры
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        
        # SSL оптимизация
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        
        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # ==========================================
        # Безопасность - заголовки
        # ==========================================
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://infrasafe.aisolutions.uz https://infrasafe.uz http://localhost:3000; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Скрываем версию Nginx
        server_tokens off;

        # Корневая директория для статических файлов
        root /usr/share/nginx/html;
        index index.html index.htm;

        # ==========================================
        # Запрет доступа к source-map файлам
        # Source-maps раскрывают исходную структуру модулей и mapping
        # минифицированных имён — безопасно в dev, запрещено в prod.
        # ==========================================
        location ~ \.map$ {
            return 404;
            access_log off;
            log_not_found off;
        }

        # ==========================================
        # Кэширование статических файлов
        # ==========================================
        location ~* \.(jpg|jpeg|gif|png|ico|svg|webp|avif)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location ~* \.(woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # HTML файлы без кэширования
        location ~* \.(html|htm)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # ==========================================
        # API проксирование
        # ==========================================
        location /api/ {
            # CORS preflight обработка
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-Request-ID' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }

            # Проксирование к backend через Docker сеть
            # ВАЖНО: app - это имя сервиса из docker-compose.unified.yml
            # Nginx автоматически добавит /api/ к пути при проксировании
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Отключаем буферизацию
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Таймауты
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # CORS заголовки для обычных ответов
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Vary' 'Origin' always;
        }

        # ==========================================
        # Swagger документация
        # ==========================================
        location /api-docs/ {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # Основная страница
        # ==========================================
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ==========================================
        # Health check endpoint
        # ==========================================
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "healthy\n";
        }

        # ==========================================
        # Обработка ошибок
        # ==========================================
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }
        
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}

