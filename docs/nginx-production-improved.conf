# Улучшенная конфигурация Nginx для InfraSafe Production
# Домен: infrasafe.aisolutions.uz
# Обновлено: 2025-11-23
#
# ВАЖНО: Эта конфигурация предназначена для использования с docker-compose.unified.yml
# Nginx должен быть в той же Docker сети 'leaflet-network', что и backend сервис 'app'
# Backend сервис доступен по имени 'app' на порту 3000 внутри Docker сети

# ==========================================
# HTTP -> HTTPS редирект
# ==========================================
server {
    listen 80;
    listen [::]:80;
    server_name infrasafe.aisolutions.uz;

    # Перенаправление с HTTP на HTTPS
    return 301 https://$host$request_uri;
}

# ==========================================
# HTTPS сервер
# ==========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name infrasafe.aisolutions.uz;

    # ==========================================
    # SSL/TLS конфигурация
    # ==========================================
    ssl_certificate /etc/letsencrypt/live/infrasafe.aisolutions.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/infrasafe.aisolutions.uz/privkey.pem;
    
    # Современные протоколы и шифры
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    
    # SSL оптимизация
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # OCSP stapling для улучшения производительности
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/infrasafe.aisolutions.uz/chain.pem;
    
    # Раскомментируйте после генерации dhparam.pem:
    # ssl_dhparam /etc/ssl/certs/dhparam.pem;

    # ==========================================
    # Безопасность - заголовки
    # ==========================================
    # HSTS (уже есть, но улучшено)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Защита от clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Предотвращение MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Защита от XSS (для старых браузеров)
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Контроль передачи referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Content Security Policy
    # Настройте под ваши нужды - разрешает подключения к API
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://infrasafe.aisolutions.uz https://infrasafe.uz; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;
    
    # Permissions Policy (замена Feature-Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ==========================================
    # CORS конфигурация (без if директивы)
    # ==========================================
    # Map для определения разрешенных источников
    map $http_origin $cors_origin {
        default "";
        "~^https://infrasafe\.uz$" "https://infrasafe.uz";
        "~^https://infrasafe\.aisolutions\.uz$" "https://infrasafe.aisolutions.uz";
    }

    # ==========================================
    # Основные настройки
    # ==========================================
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # Скрываем версию Nginx
    server_tokens off;
    
    # Максимальный размер тела запроса
    client_max_body_size 10M;
    
    # Таймауты
    client_body_timeout 12s;
    client_header_timeout 12s;
    keepalive_timeout 15s;
    send_timeout 10s;

    # ==========================================
    # Gzip сжатие
    # ==========================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
    gzip_min_length 256;
    gzip_disable "msie6";

    # ==========================================
    # Кэширование статических файлов
    # ==========================================
    location ~* \.(jpg|jpeg|gif|png|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML файлы без кэширования
    location ~* \.(html|htm)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # ==========================================
    # API проксирование
    # ==========================================
    location /api/ {
        # CORS preflight обработка
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-Request-ID' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        # Проксирование к backend
        # 
        # ВАРИАНТ 1: Если Nginx запущен в Docker (в той же сети leaflet-network)
        # Используем имя сервиса из docker-compose.unified.yml
        proxy_pass http://app:3000;
        #
        # ВАРИАНТ 2: Если Nginx запущен на хосте (не в Docker)
        # Используйте localhost и порт, проброшенный из контейнера:
        # proxy_pass http://localhost:3000;
        # Или используйте IP адрес контейнера (найдите через: docker inspect <container_id> | grep IPAddress)
        # proxy_pass http://172.17.0.X:3000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Отключаем буферизацию для streaming ответов
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # CORS заголовки для обычных ответов
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Vary' 'Origin' always;
    }

    # ==========================================
    # Swagger документация
    # ==========================================
    location /api-docs/ {
        # Используем имя сервиса из docker-compose.unified.yml (если Nginx в Docker)
        # Или localhost:3000 (если Nginx на хосте)
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # Основная страница
    # ==========================================
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # Health check endpoint
    # ==========================================
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # ==========================================
    # Обработка ошибок
    # ==========================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ==========================================
    # Логирование
    # ==========================================
    access_log /var/log/nginx/infrasafe_access.log;
    error_log /var/log/nginx/infrasafe_error.log warn;
}

# ==========================================
# Upstream для backend (опционально, для балансировки)
# ==========================================
# Если нужно несколько экземпляров backend для балансировки нагрузки:
# upstream backend_upstream {
#     server app:3000 max_fails=3 fail_timeout=30s;
#     # Можно добавить несколько серверов:
#     # server app2:3000 max_fails=3 fail_timeout=30s;
#     keepalive 32;
# }
# 
# Затем в location /api/ используйте:
# proxy_pass http://backend_upstream;

# ==========================================
# Rate limiting (опционально)
# ==========================================
# Раскомментируйте для защиты от DDoS:
# limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# 
# Затем в location /api/ добавьте:
# limit_req zone=api_limit burst=20 nodelay;

