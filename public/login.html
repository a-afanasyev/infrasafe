<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в InfraSafe</title>
    <!-- Обновляем ссылку с версией, чтобы гарантировать подгрузку свежего CSS -->
    <link rel="stylesheet" href="css/style.css?v=20251101">
    <style>
        /* Стили для страницы входа */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-header {
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 300;
        }

        .login-header p {
            color: #666;
            margin: 0;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e1e1;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .login-info {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }

        .login-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #666;
        }

        .login-info code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #333;
        }

        .loading {
            display: none;
            margin-top: 10px;
            color: #667eea;
            font-size: 14px;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        /* Анимация загрузки */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
    </style>
    
    <!-- Подключение DOMPurify для защиты от XSS -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.7/dist/purify.min.js"></script>
    
    <!-- Подключение утилит безопасности -->
    <script src="public/utils/domSecurity.js"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🔐 InfraSafe</h1>
            <p>Система мониторинга инфраструктуры</p>
        </div>

        <form id="login-form">
            <div id="error-container"></div>
            <div id="success-container"></div>
            
            <div class="form-group">
                <label for="username">Логин:</label>
                <input type="text" id="username" name="username" required
                       placeholder="Введите ваш логин" autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required
                       placeholder="Введите ваш пароль" autocomplete="current-password">
            </div>
            
            <div class="form-group">
                <button type="submit" class="login-btn" id="login-button">
                    Войти
                </button>
                <div class="loading" id="loading">Выполняется вход...</div>
            </div>
        </form>

        <div class="login-info">
            <p><strong>Для входа используйте учетные данные администратора</strong></p>
            <p style="font-size: 0.85rem; color: #666;">Обратитесь к администратору системы для получения доступа</p>
        </div>
    </div>

    <script>
        // Класс для обработки авторизации на странице login.html
        class LoginHandler {
            constructor() {
                this.initializeForm();
            }

            initializeForm() {
                const form = document.getElementById('login-form');
                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');
                const loginButton = document.getElementById('login-button');
                const loading = document.getElementById('loading');

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const username = usernameInput.value.trim();
                    const password = passwordInput.value.trim();

                    if (!username || !password) {
                        this.showError('Пожалуйста, заполните все поля');
                        return;
                    }

                    // Показываем индикатор загрузки
                    loginButton.disabled = true;
                    loading.style.display = 'block';
                    this.clearMessages();

                    try {
                        const success = await this.performLogin(username, password);
                        
                        if (success) {
                            this.showSuccess('Вход выполнен успешно! Перенаправление...');
                            
                            // Перенаправляем на главную страницу или админку
                            setTimeout(() => {
                                window.location.href = '/admin.html';
                            }, 1500);
                        }
                    } catch (error) {
                        this.showError(error.message || 'Произошла ошибка при входе');
                    } finally {
                        // Скрываем индикатор загрузки
                        loginButton.disabled = false;
                        loading.style.display = 'none';
                    }
                });

                // Автофокус на поле логина
                usernameInput.focus();
            }

            async performLogin(username, password) {
                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username, password })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        
                        // Сохраняем токен в localStorage
                        const token = data.accessToken || data.token;
                        if (token) {
                            localStorage.setItem('admin_token', token);
                            return true;
                        } else {
                            throw new Error('Токен не получен');
                        }
                    } else {
                        const errorData = await response.json();
                        throw new Error(errorData.message || errorData.error || 'Ошибка авторизации');
                    }
                } catch (error) {
                    console.error('Ошибка входа:', error);
                    throw error;
                }
            }

            showError(message) {
                this.clearMessages();
                const errorContainer = document.getElementById('error-container');
                
                // ИСПРАВЛЕНИЕ XSS: Используем безопасные методы вместо innerHTML
                if (window.DOMSecurity) {
                    window.DOMSecurity.showSecureErrorMessage(errorContainer, message);
                } else {
                    // Fallback для случая, если утилиты не загружены
                    console.warn('DOMSecurity утилиты не загружены, используется fallback');
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error-message';
                    errorDiv.textContent = message;
                    errorContainer.appendChild(errorDiv);
                }
            }

            showSuccess(message) {
                this.clearMessages();
                const successContainer = document.getElementById('success-container');
                
                // ИСПРАВЛЕНИЕ XSS: Используем безопасные методы вместо innerHTML
                if (window.DOMSecurity) {
                    window.DOMSecurity.showSecureSuccessMessage(successContainer, message);
                } else {
                    // Fallback для случая, если утилиты не загружены
                    console.warn('DOMSecurity утилиты не загружены, используется fallback');
                    const successDiv = document.createElement('div');
                    successDiv.className = 'success-message';
                    successDiv.textContent = message;
                    successContainer.appendChild(successDiv);
                }
            }

            clearMessages() {
                // ИСПРАВЛЕНИЕ XSS: Используем безопасные методы очистки
                const errorContainer = document.getElementById('error-container');
                const successContainer = document.getElementById('success-container');
                
                if (window.DOMSecurity) {
                    window.DOMSecurity.clearContainer(errorContainer);
                    window.DOMSecurity.clearContainer(successContainer);
                } else {
                    // Fallback - безопасная очистка через textContent
                    if (errorContainer) errorContainer.textContent = '';
                    if (successContainer) successContainer.textContent = '';
                }
            }
        }

        // Инициализируем обработчик при загрузке страницы
        document.addEventListener('DOMContentLoaded', () => {
            // Проверяем, есть ли уже токен - если да, перенаправляем
            const existingToken = localStorage.getItem('admin_token');
            if (existingToken) {
                console.log('Токен найден, перенаправление на админку...');
                window.location.href = '/admin.html';
                return;
            }

            // Инициализируем форму входа
            new LoginHandler();
        });
    </script>
</body>
</html>
