      <stop offset="0%" style="stop-color:#042732;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#03232D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
