services:
  infrasafe-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: infrasafe-frontend
    ports:
      - "3333:3333"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro  # Только для разработки, можно убрать в продакшене