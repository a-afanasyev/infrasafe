<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBFCFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F6F8F9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2CD13E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#41D54A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Основная форма -->
  <circle cx="16" cy="16" r="16" fill="url(#bgGradient)" />
  
  <!-- Внутренний круг -->
  <circle cx="16" cy="16" r="14" fill="#03232D" />
  <circle cx="16" cy="16" r="12" fill="url(#greenGradient)" opacity="0.9" />
  <circle cx="16" cy="16" r="10" fill="#042732" />
  
  <!-- Дом -->
  <path d="M9,13 L16,8 L23,13 L23,21 L9,21 Z" fill="#F6F8F9" />
  <rect x="12" y="16" width="3" height="3" fill="url(#greenGradient)" />
  <rect x="17" y="16" width="3" height="3" fill="url(#greenGradient)" />
  
  <!-- Линии подключения -->
  <path d="M16,21 L16,24 M13,24 L19,24" stroke="url(#greenGradient)" stroke-width="1.5" fill="none" />
</svg> 