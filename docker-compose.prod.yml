version: '3.8'
name: infrasafe

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend-only
      args:
        - BUILD_VERSION=${BUILD_VERSION:-dev}
    ports:
      - "8080:8080"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - infrasafe-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - NODE_ENV=production
    expose:
      - "3000"
    env_file: .env.prod
    environment:
      - NODE_ENV=production
      - TZ=UTC
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infrasafe-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  postgres:
    image: postgis/postgis:15-3.3
    env_file: .env.prod
    environment:
      # POSTGRES_* aliases are sourced from .env.prod (see DB_* mirrors there)
      - TZ=UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # $$ is a compose-escape — shell evaluates inside the container against env_file vars
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER && psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c 'SELECT 1;'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - infrasafe-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  postgres_data:
    driver: local

networks:
  infrasafe-network:
    driver: bridge