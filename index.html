<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Visualization</title>
    <link rel="stylesheet" href="public/libs/leaflet/leaflet.css" />
    <link rel="stylesheet" href="public/libs/leaflet/leaflet-fixes.css" />
    <link rel="stylesheet" href="public/libs/leaflet-markercluster/MarkerCluster.css" />
    <link rel="stylesheet" href="public/libs/leaflet-markercluster/MarkerCluster.Default.css" />
</head>
<body>
    <div class="header">
        InfraSafe
    </div>
    <div id="sidebar">
        <div id="ok-group">
            <h3> Normal</h3>
            <div class="status-items"></div>
        </div>
        <div id="warning-group">
            <h3> Warning</h3>
            <div class="status-items"></div>
        </div>
        <div id="leak-group">
            <h3> Протечка</h3>
            <div class="status-items"></div>
        </div>
        <div id="critical-group">
            <h3> Critical</h3>
            <div class="status-items"></div>
        </div>
        <div id="no-group">
            <h3> No controllers</h3>
            <div class="status-items"></div>
        </div>
    </div>
    <div class="content">
        <div id="map"></div>
    </div>
    <div class="footer">
        InfraSafe test version
    </div>
    <script src="public/libs/leaflet/leaflet.js"></script>
    <script src="public/libs/leaflet-markercluster/leaflet.markercluster.js"></script>
    <script src="public/script.js"></script>
</body>
</html>
